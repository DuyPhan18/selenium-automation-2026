name: Selenium Automation CI

on:
  push:
    branches: [ main, master ] # Chạy khi bạn push lên nhánh main/master
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest # Dùng máy ảo Linux để tiết kiệm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 # Hoặc version Java bạn đang dùng (11, 21...)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        run: mvn test -DsuiteXmlFile=testng.xml # Chạy file testng.xml của bạn

      - name: Upload Extent Report
        if: always() # Luôn chạy bước này kể cả khi test bị Fail
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report
          path: target/ExtentReports/ # Đường dẫn đến folder chứa report của bạn